version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: news_sentiment_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: news_sentiment
    volumes:
      - mongodb_data:/data/db
    networks:
      - news_network

  mongo-express:
    image: mongo-express:latest
    container_name: news_sentiment_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    networks:
      - news_network
    depends_on:
      - mongodb

volumes:
  mongodb_data:

networks:
  news_network:
    driver: bridge